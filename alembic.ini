# Alembic CLI config for development use, e.g.:
#
#   alembic revision --autogenerate -m "add foo column"
#   alembic history
#
# At runtime the services don't read this file — Database.init_schema builds
# the config programmatically (garmin_coach/alembic is inside the package so
# the Docker image ships it) and upgrades to head on every startup.
# The database URL comes from settings (DB_PATH) via env.py in both cases.

[alembic]
script_location = garmin_coach/storage/alembic
prepend_sys_path = .
