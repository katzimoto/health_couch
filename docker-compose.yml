# Health Coach — the whole system in one `docker compose up -d`.
#
# One image (Dockerfile), several lightweight containers, each just a different
# command. Phases map to services: start with scheduler + mcp + tunnel; enable
# `telegram` when you're ready for Phase 2/3.

x-common: &common
  build: .
  restart: unless-stopped
  env_file: .env
  volumes:
    - ./data:/app/data                    # SQLite database lives here
    - ./garmin-tokens:/root/.garminconnect # Garmin auth tokens

services:
  # ── Phase 1/2: daily Garmin pull + 07:30 morning plan ─────────────────────────
  scheduler:
    <<: *common
    command: ["python", "-m", "garmin_coach.scheduler"]
    # The service touches data/heartbeats/scheduler every 5 minutes; a stale
    # file means the loop is wedged or dead (an import-only check can't tell).
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.path.getmtime('/app/data/heartbeats/scheduler') < 900 else 1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 5m

  # ── Phase 1: FastMCP server for ChatGPT Pro ───────────────────────────────────
  mcp:
    <<: *common
    command: ["python", "-m", "garmin_coach.mcp_server"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; s=socket.create_connection(('127.0.0.1', int(os.getenv('MCP_PORT','8000'))), 3); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Phase 1: Cloudflare Tunnel → public HTTPS for the MCP server ──────────────
  # Provides a public HTTPS URL for `mcp` with no open ports / certificates.
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env (Zero Trust dashboard) and point the
  # tunnel's public hostname at http://mcp:8000.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
    depends_on:
      - mcp

  # ── Web dashboard: read-only charts + flags in the browser ────────────────────
  # Browse at http://<host>:8050. Unauthenticated by default (localhost/LAN);
  # set DASHBOARD_TOKEN and require ?token=… before exposing it publicly.
  dashboard:
    <<: *common
    command: ["python", "-m", "garmin_coach.webapp"]
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Phase 2/3: two-way Telegram coach ─────────────────────────────────────────
  # Enable once you've set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID.
  telegram:
    <<: *common
    command: ["python", "-m", "garmin_coach.telegram_bot"]
    # The bot touches data/heartbeats/telegram every 60s from its event loop,
    # so a wedged loop (e.g. blocked on a sync call) turns the container
    # unhealthy instead of passing an import-only check.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.path.getmtime('/app/data/heartbeats/telegram') < 300 else 1)"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m
